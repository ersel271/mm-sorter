# pyproject.toml

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["F", "UP", "B", "C4", "RUF"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]
"tests/vulture_whitelist.py" = ["F403"]

[tool.mypy]
python_version = "3.13"
disallow_untyped_defs = true
warn_return_any = true
no_implicit_optional = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["cv2", "serial", "yaml"]
ignore_missing_imports = true

[tool.vulture]
min_confidence = 80
paths = ["src", "config", "utils", "tests/vulture_whitelist.py"]
