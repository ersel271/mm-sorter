# pyproject.toml

[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]

[tool.mypy]
python_version = "3.13"
disallow_untyped_defs = true
warn_return_any = true
no_implicit_optional = true
warn_unused_ignores = true

[[tool.mypy.overrides]]
module = ["cv2", "serial", "yaml"]
ignore_missing_imports = true

[tool.vulture]
min_confidence = 80
paths = ["src", "config", "utils", "vulture_whitelist.py"]
