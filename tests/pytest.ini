# tests/pytest.ini

[pytest]
testpaths = tests

addopts =
    -v
    --tb=short
    --strict-markers
    --cov=config
    --cov=src
    --cov=utils
    --cov-report=term-missing
    --cov-fail-under=80

markers =
    smoke: quick sanity checks for CI
    unit: single module tests with mocks
    integration: tests spanning multiple modules
    hw: requires physical hardware (camera, serial port)
    slow: long-running tests (video replay, large datasets)