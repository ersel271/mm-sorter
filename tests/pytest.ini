# tests/pytest.ini

[pytest]
testpaths = tests

addopts =
    -v
    --tb=short
    --strict-markers
    --cov=config
    --cov=src
    --cov=utils
    --cov=sort
    --cov-report=term-missing
    --cov-fail-under=80
    --cov-branch

markers =
    ; test level(ish)
    smoke: quick sanity checks, mostly happy-path
    regression: negative, edge-case, or bug-guard tests
    slow: long-running tests

    ; hardware deps
    hw: requires physical hardware
    camera: requires a physical camera (use with hw)
    serial: requires a serial/UART port (use with hw)

    ; env deps
    visual: requires a display (cv2/matplotlib)
    pipeline: full end-to-end pipeline tests